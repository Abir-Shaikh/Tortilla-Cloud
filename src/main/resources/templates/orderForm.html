<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Place Your Order — Tortilla Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:       #faf7f2;
            --surface:  #ffffff;
            --dark:     #1a1208;
            --ink:      #2d2416;
            --muted:    #9c8f7a;
            --border:   #e8e0d0;
            --accent:   #d4501a;
            --nav-bg:   rgba(250,247,242,0.93);
        }
        [data-theme="dark"] {
            --bg:       #111009;
            --surface:  #1c1a14;
            --dark:     #f0ece3;
            --ink:      #ddd5c4;
            --muted:    #6e6452;
            --border:   #2e2a20;
            --accent:   #e8622a;
            --nav-bg:   rgba(17,16,9,0.93);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--ink);
            font-family: 'Crimson Pro', Georgia, serif;
            font-weight: 300; min-height: 100vh;
            transition: background .35s, color .35s;
        }

        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: .85rem 3rem;
            background: var(--nav-bg); backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            transition: background .35s, border-color .35s;
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .12em; color: var(--dark); }
        .logo span { color: var(--accent); }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .step-label { font-family: 'JetBrains Mono', monospace; font-size: .62rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
        .logout-btn{
            font-family: 'JetBrains Mono', monospace;
            font-size: .62rem; letter-spacing: .15em; text-transform: uppercase;
            color: var(--muted);
            background: transparent;
            border: 1px solid var(--border);
            padding: .45rem .7rem;
            border-radius: 999px;
            cursor: pointer;
            transition: color .2s, border-color .2s, background .2s;
        }
        .logout-btn:hover{ color: var(--dark); border-color: var(--muted); background: rgba(250,247,242,0.55); }

        .theme-btn {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 50px; width: 52px; height: 28px;
            cursor: pointer; position: relative;
            transition: background .3s, border-color .3s;
        }
        .theme-btn::after {
            content: ''; position: absolute; left: 4px; top: 4px;
            width: 18px; height: 18px; border-radius: 50%; background: var(--accent);
            transition: transform .3s;
        }
        [data-theme="dark"] .theme-btn::after { transform: translateX(24px); }
        .theme-icon { position: absolute; font-size: .65rem; top: 50%; transform: translateY(-50%); pointer-events: none; transition: opacity .3s; }
        .icon-sun { right: 7px; opacity: 1; }
        .icon-moon { left: 7px; opacity: 0; }
        [data-theme="dark"] .icon-sun { opacity: 0; }
        [data-theme="dark"] .icon-moon { opacity: 1; }

        .page { padding: 100px 3rem 4rem; max-width: 1000px; margin: 0 auto; }

        .page-head {
            padding-bottom: 2.5rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem;
            display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
        }
        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 7vw, 5.5rem); line-height: .95; letter-spacing: .02em; color: var(--dark); }
        .page-title em { font-style: italic; font-family: 'Crimson Pro', serif; color: var(--accent); }
        .page-sub { font-size: 1rem; color: var(--muted); font-style: italic; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }

        .form-card {
            background: var(--surface); padding: 2rem 2rem 2.5rem;
            border-right: 1px solid var(--border);
            animation: fadeUp .5s ease both;
            transition: background .35s, border-color .35s;
        }
        .form-card:last-child { border-right: none; }
        .form-card:nth-child(1) { animation-delay: .05s; }
        .form-card:nth-child(2) { animation-delay: .15s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-family: 'JetBrains Mono', monospace; font-size: .62rem; letter-spacing: .18em;
            text-transform: uppercase; color: var(--muted); margin-bottom: 1.8rem;
            display: flex; align-items: center; gap: .8rem;
        }
        .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .fields { display: flex; flex-direction: column; gap: 1.4rem; }
        .field { display: flex; flex-direction: column; gap: .4rem; }

        .field-label {
            font-family: 'JetBrains Mono', monospace; font-size: .6rem; letter-spacing: .16em;
            text-transform: uppercase; color: var(--muted);
        }

        .field-input {
            background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
            color: var(--dark); font-family: 'Crimson Pro', serif;
            font-size: 1.05rem; font-weight: 400; padding: .5rem .2rem; outline: none;
            transition: border-color .2s, background .35s, color .35s, box-shadow .2s;
        }
        .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,80,26,.1); }
        .field-input::placeholder { color: var(--border); }

        /* error state — red border on invalid fields */
        .field-input.is-error {
            border-color: #e05252;
            box-shadow: 0 0 0 3px rgba(224,82,82,.1);
        }

        /* error message */
        .field-error {
            font-family: 'JetBrains Mono', monospace;
            font-size: .58rem; letter-spacing: .07em;
            color: #e05252; margin-top: .1rem;
            display: flex; align-items: center; gap: .3rem;
            animation: fadeUp .2s ease;
        }
        .field-error::before { content: '⚠'; font-size: .6rem; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .submit-row {
            margin-top: 2rem; padding: 1.8rem 2rem;
            border: 1px solid var(--border); border-radius: 4px;
            background: var(--surface);
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
            animation: fadeUp .5s .25s ease both;
            transition: background .35s, border-color .35s;
        }
        .submit-note { font-size: .9rem; color: var(--muted); font-style: italic; max-width: 380px; line-height: 1.6; }

        .btn-submit {
            background: var(--dark); color: var(--bg); border: none;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: .14em;
            padding: .85rem 2.8rem; cursor: pointer; position: relative; overflow: hidden;
            transition: background .3s, color .3s;
        }
        .btn-submit::before { content: ''; position: absolute; inset: 0; background: var(--accent); transform: translateX(-101%); transition: transform .3s ease; }
        .btn-submit:hover::before { transform: translateX(0); }
        .btn-submit span { position: relative; z-index: 1; }

        @media (max-width: 760px) {
            .topbar, .page { padding-left: 1.5rem; padding-right: 1.5rem; }
            .form-grid { grid-template-columns: 1fr; }
            .form-card { border-right: none; border-bottom: 1px solid var(--border); }
            .form-card:last-child { border-bottom: none; }
            .two-col { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="topbar">
    <div class="logo">Tortilla<span>Cloud</span></div>
    <div class="nav-right">
        <span class="step-label">Step 02 / Order</span>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">Logout</button>
        </form>
        <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode">
            <span class="theme-icon icon-sun">☀</span>
            <span class="theme-icon icon-moon">☽</span>
        </button>
    </div>
</nav>

<div class="page">
    <div class="page-head">
        <h1 class="page-title">Almost<br><em>There.</em></h1>
        <p class="page-sub">Where should we send your tortilla?</p>
    </div>

    <form method="post" th:action="@{/orders}" th:object="${order}">
        <div class="form-grid">

            <!-- ── DELIVERY ── -->
            <div class="form-card">
                <div class="card-title">Delivery Details</div>
                <div class="fields">

                    <div class="field">
                        <label class="field-label" for="name">Full Name</label>
                        <input id="name" type="text" th:field="*{name}" placeholder="Jane Doe"
                               th:classappend="${#fields.hasErrors('name')} ? 'field-input is-error' : 'field-input'"/>
                        <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                    </div>

                    <div class="field">
                        <label class="field-label" for="street">Street Address</label>
                        <input id="street" type="text" th:field="*{street}" placeholder="123 Main Street"
                               th:classappend="${#fields.hasErrors('street')} ? 'field-input is-error' : 'field-input'"/>
                        <span class="field-error" th:if="${#fields.hasErrors('street')}" th:errors="*{street}"></span>
                    </div>

                    <div class="two-col">
                        <div class="field">
                            <label class="field-label" for="city">City</label>
                            <input id="city" type="text" th:field="*{city}" placeholder="Springfield"
                                   th:classappend="${#fields.hasErrors('city')} ? 'field-input is-error' : 'field-input'"/>
                            <span class="field-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></span>
                        </div>
                        <div class="field">
                            <label class="field-label" for="state">State</label>
                            <input id="state" type="text" th:field="*{state}" placeholder="IL"
                                   th:classappend="${#fields.hasErrors('state')} ? 'field-input is-error' : 'field-input'"/>
                            <span class="field-error" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></span>
                        </div>
                    </div>

                    <div class="field">
                        <label class="field-label" for="zip">ZIP Code</label>
                        <input id="zip" type="text" th:field="*{zip}" placeholder="62701"
                               th:classappend="${#fields.hasErrors('zip')} ? 'field-input is-error' : 'field-input'"/>
                        <span class="field-error" th:if="${#fields.hasErrors('zip')}" th:errors="*{zip}"></span>
                    </div>

                </div>
            </div>

            <!-- ── PAYMENT ── -->
            <div class="form-card">
                <div class="card-title">Payment</div>
                <div class="fields">

                    <div class="field">
                        <label class="field-label" for="ccNumber">Card Number</label>
                        <input id="ccNumber" type="text" th:field="*{ccNumber}" placeholder="•••• •••• •••• ••••"
                               th:classappend="${#fields.hasErrors('ccNumber')} ? 'field-input is-error' : 'field-input'"/>
                        <span class="field-error" th:if="${#fields.hasErrors('ccNumber')}" th:errors="*{ccNumber}"></span>
                    </div>

                    <div class="two-col">
                        <div class="field">
                            <label class="field-label" for="ccExpiration">Expiry</label>
                            <input id="ccExpiration" type="text" th:field="*{ccExpiration}" placeholder="MM/YY"
                                   th:classappend="${#fields.hasErrors('ccExpiration')} ? 'field-input is-error' : 'field-input'"/>
                            <span class="field-error" th:if="${#fields.hasErrors('ccExpiration')}" th:errors="*{ccExpiration}"></span>
                        </div>
                        <div class="field">
                            <label class="field-label" for="ccCVV">CVV</label>
                            <input id="ccCVV" type="text" th:field="*{ccCVV}" placeholder="•••"
                                   th:classappend="${#fields.hasErrors('ccCVV')} ? 'field-input is-error' : 'field-input'"/>
                            <span class="field-error" th:if="${#fields.hasErrors('ccCVV')}" th:errors="*{ccCVV}"></span>
                        </div>
                    </div>

                </div>
            </div>

        </div>

        <div class="submit-row">
            <p class="submit-note">By placing your order you agree to our terms. Your card will only be charged upon confirmation.</p>
            <button type="submit" class="btn-submit"><span>Place Order →</span></button>
        </div>

    </form>
</div>

<script>
    const html  = document.documentElement;
    const btn   = document.getElementById('themeBtn');
    const saved = localStorage.getItem('tc-theme');
    if (saved) html.setAttribute('data-theme', saved);
    btn.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('tc-theme', next);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Your Order — Tortilla Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:        #0f0e0c;
            --surface:   #1a1814;
            --border:    #2e2b25;
            --accent:    #e8a025;
            --accent2:   #c45c1a;
            --text:      #f0ece3;
            --muted:     #7a7060;
            --error:     #e05252;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── background texture ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                    radial-gradient(ellipse 80% 60% at 10% 20%, rgba(232,160,37,.07) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 80% at 90% 80%, rgba(196,92,26,.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── header ── */
        header {
            position: relative;
            z-index: 1;
            padding: 2.5rem 4rem 0;
            display: flex;
            align-items: baseline;
            gap: 1rem;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .brand-sep { color: var(--muted); font-size: .8rem; }

        .page-label {
            font-size: .75rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── hero ── */
        .hero {
            position: relative;
            z-index: 1;
            padding: 3rem 4rem 0;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 6vw, 5.5rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -.02em;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .hero-sub {
            margin-top: .8rem;
            color: var(--muted);
            font-size: .9rem;
            letter-spacing: .04em;
        }

        /* ── divider ── */
        .divider {
            position: relative;
            z-index: 1;
            margin: 2.5rem 4rem;
            height: 1px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
        }

        /* ── layout ── */
        .layout {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 0 4rem 4rem;
            max-width: 1200px;
        }

        /* ── section card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 2rem;
            animation: fadeUp .5s ease both;
        }

        .card:nth-child(1) { animation-delay: .05s; }
        .card:nth-child(2) { animation-delay: .15s; }
        .card.full-width {
            grid-column: 1 / -1;
            animation-delay: .25s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .card-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── form fields ── */
        .field-group {
            display: grid;
            gap: 1.2rem;
        }

        .field-group.two-col {
            grid-template-columns: 1fr 1fr;
        }

        .field-group.three-col {
            grid-template-columns: 2fr 1fr 1fr;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: .4rem;
        }

        label {
            font-size: .7rem;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"] {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            font-weight: 300;
            padding: .75rem 1rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,160,37,.12);
        }

        input::placeholder { color: #3a3830; }

        /* ── submit area ── */
        .submit-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .note {
            font-size: .78rem;
            color: var(--muted);
            max-width: 340px;
            line-height: 1.6;
        }

        .btn-submit {
            position: relative;
            background: var(--accent);
            color: #0f0e0c;
            border: none;
            border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: .8rem;
            font-weight: 500;
            letter-spacing: .16em;
            text-transform: uppercase;
            padding: 1rem 2.5rem;
            cursor: pointer;
            overflow: hidden;
            transition: background .2s, transform .15s;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,.15);
            opacity: 0;
            transition: opacity .2s;
        }

        .btn-submit:hover {
            background: #f0ac2d;
            transform: translateY(-1px);
        }

        .btn-submit:hover::after { opacity: 1; }
        .btn-submit:active { transform: translateY(0); }

        /* ── accent line on card hover ── */
        .card {
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--accent), var(--accent2));
            transform: scaleY(0);
            transform-origin: top;
            transition: transform .3s ease;
        }

        .card:focus-within::before { transform: scaleY(1); }

        /* ── responsive ── */
        @media (max-width: 780px) {
            header, .hero, .divider, .layout {
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
            .layout { grid-template-columns: 1fr; }
            .card.full-width { grid-column: 1; }
            .field-group.two-col,
            .field-group.three-col { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <span class="brand">Tortilla Cloud</span>
    <span class="brand-sep">/</span>
    <span class="page-label">Complete Your Order</span>
</header>

<div class="hero">
    <h1>Almost <em>there.</em></h1>
    <p class="hero-sub">Where should we deliver your masterpiece?</p>
</div>

<div class="divider"></div>

<form method="post" th:action="@{/orders}" th:object="${order}">
    <div class="layout">

        <!-- Delivery Details -->
        <div class="card">
            <div class="card-title">Delivery Details</div>
            <div class="field-group">
                <div class="field">
                    <label for="name">Full Name</label>
                    <input id="name" type="text" th:field="*{name}" placeholder="Jane Doe"/>
                </div>
                <div class="field">
                    <label for="street">Street Address</label>
                    <input id="street" type="text" th:field="*{street}" placeholder="123 Main Street"/>
                </div>
                <div class="field-group two-col">
                    <div class="field">
                        <label for="city">City</label>
                        <input id="city" type="text" th:field="*{city}" placeholder="Springfield"/>
                    </div>
                    <div class="field">
                        <label for="state">State</label>
                        <input id="state" type="text" th:field="*{state}" placeholder="IL"/>
                    </div>
                </div>
                <div class="field">
                    <label for="zip">ZIP Code</label>
                    <input id="zip" type="text" th:field="*{zip}" placeholder="62701"/>
                </div>
            </div>
        </div>

        <!-- Payment -->
        <div class="card">
            <div class="card-title">Payment</div>
            <div class="field-group">
                <div class="field">
                    <label for="ccNumber">Card Number</label>
                    <input id="ccNumber" type="text" th:field="*{ccNumber}" placeholder="•••• •••• •••• ••••"/>
                </div>
                <div class="field-group two-col">
                    <div class="field">
                        <label for="ccExpiration">Expiration</label>
                        <input id="ccExpiration" type="text" th:field="*{ccExpiration}" placeholder="MM / YY"/>
                    </div>
                    <div class="field">
                        <label for="ccCVV">CVV</label>
                        <input id="ccCVV" type="text" th:field="*{ccCVV}" placeholder="•••"/>
                    </div>
                </div>
            </div>
        </div>

        <!-- Submit -->
        <div class="card full-width">
            <div class="submit-area">
                <p class="note">By placing your order you agree to our terms. Your card will be charged only upon confirmation.</p>
                <button type="submit" class="btn-submit">Place Order →</button>
            </div>
        </div>

    </div>
</form>

</body>
</html>

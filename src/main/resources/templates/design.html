<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Design Your Tortilla — Tortilla Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:       #faf7f2;
            --surface:  #ffffff;
            --dark:     #1a1208;
            --ink:      #2d2416;
            --muted:    #9c8f7a;
            --border:   #e8e0d0;
            --accent:   #d4501a;
            --nav-bg:   rgba(250,247,242,0.93);
        }
        [data-theme="dark"] {
            --bg:       #111009;
            --surface:  #1c1a14;
            --dark:     #f0ece3;
            --ink:      #ddd5c4;
            --muted:    #6e6452;
            --border:   #2e2a20;
            --accent:   #e8622a;
            --nav-bg:   rgba(17,16,9,0.93);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Crimson Pro', Georgia, serif;
            font-weight: 300;
            min-height: 100vh;
            transition: background .35s, color .35s;
        }

        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: .85rem 3rem;
            background: var(--nav-bg);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            transition: background .35s, border-color .35s;
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .12em; color: var(--dark); }
        .logo span { color: var(--accent); }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .step-label { font-family: 'JetBrains Mono', monospace; font-size: .62rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
        .logout-btn{
            font-family: 'JetBrains Mono', monospace;
            font-size: .62rem; letter-spacing: .15em; text-transform: uppercase;
            color: var(--muted);
            background: transparent;
            border: 1px solid var(--border);
            padding: .45rem .7rem;
            border-radius: 999px;
            cursor: pointer;
            transition: color .2s, border-color .2s, background .2s;
        }
        .logout-btn:hover{ color: var(--dark); border-color: var(--muted); background: rgba(250,247,242,0.55); }

        .theme-btn {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 50px; width: 52px; height: 28px;
            cursor: pointer; position: relative;
            transition: background .3s, border-color .3s;
        }
        .theme-btn::after {
            content: ''; position: absolute; left: 4px; top: 4px;
            width: 18px; height: 18px; border-radius: 50%; background: var(--accent);
            transition: transform .3s;
        }
        [data-theme="dark"] .theme-btn::after { transform: translateX(24px); }
        .theme-icon { position: absolute; font-size: .65rem; top: 50%; transform: translateY(-50%); pointer-events: none; transition: opacity .3s; }
        .icon-sun { right: 7px; opacity: 1; }
        .icon-moon { left: 7px; opacity: 0; }
        [data-theme="dark"] .icon-sun { opacity: 0; }
        [data-theme="dark"] .icon-moon { opacity: 1; }

        .page { padding: 100px 3rem 6rem; max-width: 1200px; margin: 0 auto; }

        .page-head {
            padding-bottom: 2.5rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem;
            display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
        }
        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 7vw, 5.5rem); line-height: .95; letter-spacing: .02em; color: var(--dark); }
        .page-title em { font-style: italic; font-family: 'Crimson Pro', serif; color: var(--accent); }
        .page-sub { font-size: 1rem; color: var(--muted); font-style: italic; }

        .name-section { margin-bottom: 3.5rem; animation: fadeUp .5s .05s ease both; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .field-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: .63rem; letter-spacing: .18em;
            text-transform: uppercase; color: var(--muted);
            display: block; margin-bottom: .5rem;
        }

        /* ── error message style ── */
        .field-error {
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem; letter-spacing: .08em;
            color: #e05252;
            margin-top: .35rem;
            display: flex; align-items: center; gap: .35rem;
        }
        .field-error::before { content: '⚠'; font-size: .65rem; }

        /* input with error — red border */
        .input-error {
            border-color: #e05252 !important;
            box-shadow: 0 0 0 3px rgba(224,82,82,.12) !important;
        }
        .name-input-error {
            border-bottom-color: #e05252 !important;
        }

        /* ingredients error banner */
        .ingredients-error {
            margin-top: .8rem;
            padding: .6rem 1rem;
            border: 1px solid #e05252;
            border-radius: 3px;
            background: rgba(224,82,82,.07);
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem; letter-spacing: .08em;
            color: #e05252;
            display: flex; align-items: center; gap: .4rem;
        }
        .ingredients-error::before { content: '⚠'; }

        .name-input {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 2.8rem);
            letter-spacing: .06em; color: var(--dark);
            background: transparent; border: none;
            border-bottom: 2px solid var(--border);
            outline: none; width: 100%; max-width: 560px;
            padding: .4rem 0;
            transition: border-color .2s, color .3s;
        }
        .name-input:focus { border-color: var(--accent); }
        .name-input::placeholder { color: var(--border); }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: .62rem; letter-spacing: .18em;
            text-transform: uppercase; color: var(--muted);
            margin-bottom: 1.2rem;
            display: flex; align-items: center; gap: .8rem;
        }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .categories {
            display: grid; grid-template-columns: repeat(5, 1fr);
            border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
            animation: fadeUp .5s .15s ease both; transition: border-color .35s;
        }
        .category { border-right: 1px solid var(--border); transition: border-color .35s; }
        .category:last-child { border-right: none; }

        .cat-header {
            padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: .5rem; transition: border-color .35s;
        }
        .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .cat-wrap    .cat-dot { background: #b85c00; }
        .cat-protein .cat-dot { background: #b71c1c; }
        .cat-veggies .cat-dot { background: #2e7d32; }
        .cat-cheese  .cat-dot { background: #f57f17; }
        .cat-sauce   .cat-dot { background: #1565c0; }

        .cat-name { font-family: 'JetBrains Mono', monospace; font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink); transition: color .35s; }
        .cat-body { padding: .8rem; }

        .ing-item { display: flex; align-items: center; gap: .6rem; padding: .5rem .4rem; border-radius: 3px; transition: background .15s; }
        .ing-item:hover { background: rgba(212,80,26,.07); }

        .ing-item input[type="checkbox"] {
            appearance: none; width: 15px; height: 15px;
            border: 1.5px solid var(--border); border-radius: 2px; flex-shrink: 0; cursor: pointer;
            position: relative; transition: border-color .15s, background .15s;
        }
        .ing-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
        .ing-item input[type="checkbox"]:checked::after {
            content: ''; position: absolute; left: 3px; top: 1px;
            width: 5px; height: 8px; border: 2px solid white;
            border-top: none; border-left: none; transform: rotate(45deg);
        }
        .ing-name { font-size: .9rem; color: var(--ink); cursor: pointer; transition: color .15s; line-height: 1.3; }
        .ing-item:hover .ing-name { color: var(--accent); }

        .submit-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 1.2rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            transition: background .35s, border-color .35s;
        }
        .count-wrap { display: flex; align-items: baseline; gap: .6rem; }
        .count-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--accent); line-height: 1; }
        .count-txt { font-family: 'JetBrains Mono', monospace; font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

        .btn-submit {
            background: var(--dark); color: var(--bg); border: none;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: .14em;
            padding: .85rem 2.8rem; cursor: pointer; position: relative; overflow: hidden;
            transition: background .3s, color .3s;
        }
        .btn-submit::before { content: ''; position: absolute; inset: 0; background: var(--accent); transform: translateX(-101%); transition: transform .3s ease; }
        .btn-submit:hover::before { transform: translateX(0); }
        .btn-submit span { position: relative; z-index: 1; }

        @media (max-width: 860px) {
            .topbar, .page, .submit-bar { padding-left: 1.5rem; padding-right: 1.5rem; }
            .categories { grid-template-columns: 1fr 1fr; }
            .category { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<nav class="topbar">
    <div class="logo">Tortilla<span>Cloud</span></div>
    <div class="nav-right">
        <span class="step-label">Step 01 / Design</span>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">Logout</button>
        </form>
        <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode">
            <span class="theme-icon icon-sun">☀</span>
            <span class="theme-icon icon-moon">☽</span>
        </button>
    </div>
</nav>

<div class="page">
    <div class="page-head">
        <h1 class="page-title">Design Your<br><em>Tortilla</em></h1>
        <p class="page-sub">Name it. Build it. Own it.</p>
    </div>

    <form method="post"
          th:action="@{/design}"
          th:object="${design}"
          id="designForm">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <!-- NAME field with error -->
        <div class="name-section">
            <label class="field-label" for="name">Name your tortilla creation</label>
            <input id="name" type="text" th:field="*{name}" placeholder="MY SIGNATURE WRAP"
                   th:classappend="${#fields.hasErrors('name')} ? 'name-input name-input-error' : 'name-input'"/>
            <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <div class="section-label">Choose your ingredients</div>

        <div class="categories">

            <!-- WRAP -->
            <div class="category cat-wrap">
                <div class="cat-header"><div class="cat-dot"></div><span class="cat-name">Wrap</span></div>
                <div class="cat-body">
                    <div th:each="ingredient : ${wrap}" class="ing-item">
                        <input type="checkbox" th:field="*{ingredients}"
                               th:value="${ingredient.id}" th:id="${ingredient.id}"/>
                        <label th:for="${ingredient.id}" class="ing-name" th:text="${ingredient.name}">Ingredient</label>
                    </div>
                </div>
            </div>

            <!-- PROTEIN -->
            <div class="category cat-protein">
                <div class="cat-header"><div class="cat-dot"></div><span class="cat-name">Protein</span></div>
                <div class="cat-body">
                    <div th:each="ingredient : ${protein}" class="ing-item">
                        <input type="checkbox" th:field="*{ingredients}"
                               th:value="${ingredient.id}" th:id="${ingredient.id}"/>
                        <label th:for="${ingredient.id}" class="ing-name" th:text="${ingredient.name}">Ingredient</label>
                    </div>
                </div>
            </div>

            <!-- VEGGIES -->
            <div class="category cat-veggies">
                <div class="cat-header"><div class="cat-dot"></div><span class="cat-name">Veggies</span></div>
                <div class="cat-body">
                    <div th:each="ingredient : ${veggies}" class="ing-item">
                        <input type="checkbox" th:field="*{ingredients}"
                               th:value="${ingredient.id}" th:id="${ingredient.id}"/>
                        <label th:for="${ingredient.id}" class="ing-name" th:text="${ingredient.name}">Ingredient</label>
                    </div>
                </div>
            </div>

            <!-- CHEESE -->
            <div class="category cat-cheese">
                <div class="cat-header"><div class="cat-dot"></div><span class="cat-name">Cheese</span></div>
                <div class="cat-body">
                    <div th:each="ingredient : ${cheese}" class="ing-item">
                        <input type="checkbox" th:field="*{ingredients}"
                               th:value="${ingredient.id}" th:id="${ingredient.id}"/>
                        <label th:for="${ingredient.id}" class="ing-name" th:text="${ingredient.name}">Ingredient</label>
                    </div>
                </div>
            </div>

            <!-- SAUCE -->
            <div class="category cat-sauce">
                <div class="cat-header"><div class="cat-dot"></div><span class="cat-name">Sauce</span></div>
                <div class="cat-body">
                    <div th:each="ingredient : ${sauce}" class="ing-item">
                        <input type="checkbox" th:field="*{ingredients}"
                               th:value="${ingredient.id}" th:id="${ingredient.id}"/>
                        <label th:for="${ingredient.id}" class="ing-name" th:text="${ingredient.name}">Ingredient</label>
                    </div>
                </div>
            </div>

        </div>

        <!-- INGREDIENTS error shown below the grid -->
        <div class="ingredients-error" th:if="${#fields.hasErrors('ingredients')}" th:errors="*{ingredients}"></div>

    </form>
</div>

<div class="submit-bar">
    <div class="count-wrap">
        <span class="count-num" id="count">0</span>
        <span class="count-txt">ingredients selected</span>
    </div>
    <button type="submit" form="designForm" class="btn-submit">
        <span>Submit Your Tortilla →</span>
    </button>
</div>

<script>
    const html = document.documentElement;
    const btn  = document.getElementById('themeBtn');
    const saved = localStorage.getItem('tc-theme');
    if (saved) html.setAttribute('data-theme', saved);
    btn.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('tc-theme', next);
    });

    document.querySelectorAll('input[type="checkbox"]')
        .forEach(cb => cb.addEventListener('change', () => {
            document.getElementById('count').textContent =
                document.querySelectorAll('input[type="checkbox"]:checked').length;
        }));
</script>
</body>
</html>
